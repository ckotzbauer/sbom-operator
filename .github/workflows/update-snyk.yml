name: update-snyk

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  update-snyk:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-scan-snyk.yml@5eba4a9063c75ab16cc2c98722ea493f71159331 # 0.53.1
    with:
      install-go: true
      scan-commands: snyk monitor
    secrets:
      token: ${{ secrets.SNYK_TOKEN }}
