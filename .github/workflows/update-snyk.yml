name: update-snyk

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  update-snyk:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-scan-snyk.yml@4d43609588f06b292be03b3c2c39c8c9ee36abaf # 0.53.0
    with:
      install-go: true
      scan-commands: snyk monitor
    secrets:
      token: ${{ secrets.SNYK_TOKEN }}
