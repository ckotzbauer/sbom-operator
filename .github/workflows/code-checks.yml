name: code-checks

on:
  pull_request: {}
  push:
    branches:
      - "**"

permissions:
  actions: read
  contents: read

jobs:
  gosec:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@127bf24eda432e06ca81296442031074473d58f4 # 0.55.9
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lintsec

  golint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@127bf24eda432e06ca81296442031074473d58f4 # 0.55.9
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lint
