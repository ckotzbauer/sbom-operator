name: code-checks

on:
  pull_request: {}
  push:
    branches:
      - "**"

jobs:
  gosec:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@4d43609588f06b292be03b3c2c39c8c9ee36abaf # 0.53.0
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lintsec

  golint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@4d43609588f06b292be03b3c2c39c8c9ee36abaf # 0.53.0
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lint
