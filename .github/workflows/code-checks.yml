name: code-checks

on:
  pull_request: {}
  push:
    branches:
      - "**"

jobs:
  gosec:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@d5d51e78c95c555c23d5ec484a5a32aa7d02616e # 0.51.0
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lintsec

  golint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@d5d51e78c95c555c23d5ec484a5a32aa7d02616e # 0.51.0
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lint
