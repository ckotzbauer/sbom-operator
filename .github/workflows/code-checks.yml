name: code-checks

on:
  pull_request: {}
  push:
    branches:
      - "**"

permissions:
  actions: read
  contents: read

jobs:
  gosec:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@45d0839af5e9f59dad1371664bd28d2ecf24ff93 # 0.55.5
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lintsec

  golint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@45d0839af5e9f59dad1371664bd28d2ecf24ff93 # 0.55.5
    with:
      install-go: true
      lint-commands: |
        make bootstrap-tools
        make lint
