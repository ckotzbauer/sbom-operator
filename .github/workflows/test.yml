name: test

on:
  pull_request: {}
  push:
    branches:
      - "**"

jobs:
  test:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@4d43609588f06b292be03b3c2c39c8c9ee36abaf # 0.53.0
    with:
      install-go: true
      install-goreleaser: true
      install-cosign: true
      install-syft: true
      build-commands: make build
      test-commands: make test
      report-coverage: true
      coverage-file: cover.out
      build-image: true
      docker-tag: ghcr.io/ckotzbauer/sbom-operator:latest
