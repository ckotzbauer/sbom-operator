name: test

on:
  pull_request: {}
  push:
    branches:
      - "**"

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  test:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@ec37c041a36a69320d9cb6a4c41c89f84f7e02cd # 0.55.1
    with:
      install-go: true
      install-goreleaser: true
      install-cosign: true
      install-syft: true
      build-commands: make build
      test-commands: make test
      report-coverage: true
      coverage-file: cover.out
      build-image: true
      docker-tag: ghcr.io/ckotzbauer/sbom-operator:latest
