name: test

on:
  pull_request: {}
  push:
    branches:
      - "**"

jobs:
  test:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@d5d51e78c95c555c23d5ec484a5a32aa7d02616e # 0.51.0
    with:
      install-go: true
      install-goreleaser: true
      install-cosign: true
      install-syft: true
      build-commands: make build
      test-commands: make test
      report-coverage: true
      coverage-file: cover.out
      build-image: true
      docker-tag: ghcr.io/ckotzbauer/sbom-operator:latest
