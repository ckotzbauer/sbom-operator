name: auto-release

on:
  schedule:
    - cron: "0 8 * * 2"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: write

jobs:
  auto-release:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-auto-release.yml@187b42cc2ca9bc9257d6e72bb1c1be730f1d0565 # 0.56.0
    with:
      release-workflow: create-release.yml
    secrets:
      token: ${{ secrets.REPO_ACCESS }}