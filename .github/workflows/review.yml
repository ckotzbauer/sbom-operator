name: review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-review.yml@45d0839af5e9f59dad1371664bd28d2ecf24ff93 # 0.55.5
    secrets:
      openrouter-token: ${{ secrets.OPENROUTER_TOKEN }}
