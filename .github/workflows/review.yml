name: review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-review.yml@203116543badcfcd7abcca662aced7ffcaf438d4 # 0.55.4
    secrets:
      openrouter-token: ${{ secrets.OPENROUTER_TOKEN }}
