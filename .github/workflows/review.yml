name: review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-review.yml@5eba4a9063c75ab16cc2c98722ea493f71159331 # 0.53.1
    secrets:
      openrouter-token: ${{ secrets.OPENROUTER_TOKEN }}
